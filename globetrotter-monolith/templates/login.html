{% extends "base.html" %}
{% block title %}Log in — GlobeTrotter{% endblock %}
{% block content %}
  <div class="form-card">
    <h1>Log in</h1>
    <form id="login-form">
      <label>Username</label>
      <input type="text" id="username" required>

      <label>Password</label>
      <input type="password" id="password" required>

      <button type="submit">Log in</button>
      <p id="login-message"></p>
    </form>
    <p>New here? <a href="{{ url_for('page_register') }}">Create an account</a></p>
  </div>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('login-message');

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) {
        msg.textContent = data.error || 'Login failed';
        msg.className = 'error';
        return;
      }
      localStorage.setItem('gt_token', data.token);
      localStorage.setItem('gt_username', username);
      window.location.href = "{{ url_for('page_home') }}";
    } catch (err) {
      msg.textContent = 'Network error: ' + err;
      msg.className = 'error';
    }
  });
</script>
{% endblock %}
